# Mosquitto Configuration - Ancianato IoT
# Escucha en el puerto estándar MQTT
listener 1883
# Permitir conexiones anónimas (para desarrollo con ESP32)
allow_anonymous true
# Logging
log_type all
log_dest stdout
# Persistencia de mensajes
persistence true
persistence_location /mosquitto/data/
# Logs
log_dest file /mosquitto/log/mosquitto.log
